name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - docs-site/**
      - docs/**
      - mkdocs.yml
      - docs-site-requirements.txt
      - README.md
      - CHANGELOG.md
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -r docs-site-requirements.txt
      - run: python scripts/sync_doc_screenshots.py
      - run: mkdocs gh-deploy --force --clean --verbose
