name: Publish Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.1.0). If empty, uses latest git tag.'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            version="${{ github.event.inputs.tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
          fi
          if [ -z "$version" ]; then
            echo "No v* tag found to publish." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout release ref
        run: git checkout "${{ steps.version.outputs.version }}"

      - name: Strip v prefix
        id: semver
        run: |
          version="${{ steps.version.outputs.version }}"
          echo "clean=${version#v}" >> "$GITHUB_OUTPUT"

      # github.sha is the branch head that triggered the run, not the tag that
      # was just checked out — resolve the sha from the release ref itself.
      - name: Resolve build sha
        id: buildsha
        run: echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/brownjuly2003-code/ab-test-research-designer
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.semver.outputs.clean }}
            type=raw,value=latest
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=AB Test Research Designer
            org.opencontainers.image.description=Local-first A/B test research designer (FastAPI + React)
            org.opencontainers.image.licenses=MIT

      # Build a local single-arch image first so it can be scanned before
      # anything is pushed to the registry.
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          build-args: |
            GIT_SHA=${{ steps.buildsha.outputs.sha }}
          tags: scan-target:candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for critical vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: scan-target:candidate
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GIT_SHA=${{ steps.buildsha.outputs.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
