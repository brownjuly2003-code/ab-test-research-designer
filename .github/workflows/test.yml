name: Tests

# Branch work runs once via pull_request; push is scoped to main so a PR
# revision is not built twice (audit 16.07 G-10). A branch without a PR can
# still be exercised via workflow_dispatch. Newer pushes to the same ref
# cancel a stale in-flight run, except on main where every merge must finish
# its badge update.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            verify_args: "--with-e2e --with-coverage --artifacts-dir .ci-artifacts"
          - os: windows-latest
            verify_args: "--skip-smoke"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install -r app/backend/requirements-dev.txt

      - name: Install frontend dependencies
        run: npm --prefix app/frontend ci

      - name: Install Playwright browser (node)
        if: matrix.os == 'ubuntu-latest'
        run: npm --prefix app/frontend exec -- playwright install --with-deps chromium

      - name: Install Playwright browser (python)
        if: matrix.os == 'ubuntu-latest'
        run: python -m playwright install chromium

      - name: Run verify pipeline
        run: python scripts/verify_all.py ${{ matrix.verify_args }}

      - name: Upload verify metrics artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verify-metrics
          path: |
            .ci-artifacts/backend-junit.xml
            .ci-artifacts/frontend-junit.xml
            .ci-artifacts/coverage-backend.json
          # A missing artifact means the badge would silently drop a whole test
          # suite (audit F-06), so absence is an error, not a warning.
          if-no-files-found: error

      - name: Upload smoke failure dump
        if: failure() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-failure
          path: archive/smoke-runs/
          if-no-files-found: ignore

  locale-content:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Verify locale content gate detector
        run: python scripts/check_locale_content.py --self-test

      - name: Check locale catalogs for mojibake / replacement chars
        run: python scripts/check_locale_content.py

  repo-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Verify repo-hygiene detector
        run: python scripts/check_repo_hygiene.py --self-test

      - name: Check no internal archive/ or root audit_*.md is tracked
        run: python scripts/check_repo_hygiene.py

      # check_repo_hygiene guards the git index; this guards the public HF Space, which is
      # uploaded from the working tree and so leaks a different set of files.
      - name: Verify the HF Space publish filter excludes internal notes
        run: python scripts/deploy_hf.py --self-test

      # The seven help*.html theory pages are build artifacts of one template + string
      # tables; fail if a committed page was hand-edited past its generator.
      - name: Check help pages match their generator
        run: python scripts/build_help_pages.py --check

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install pip-audit
        run: python -m pip install pip-audit==2.10.0

      # requirements-dev.txt includes -r requirements.txt, so this covers the
      # runtime set and the toolchain in one pass.
      - name: Audit backend dependencies for known CVEs
        run: python -m pip_audit -r app/backend/requirements-dev.txt --progress-spinner off

      # Both npm package roots are gated, not just Python. `npm audit` resolves the tree from
      # the committed lockfile, so no `npm ci` is needed here. --audit-level=high fails the job
      # on any high/critical advisory; lower severities are reported but do not block.
      # Use working-directory, not `npm --prefix`: with no node_modules present, --prefix drops
      # npm into a full registry tree resolution that takes minutes, while running inside the
      # package root reads the lockfile directly and finishes in seconds.
      - name: Audit frontend npm dependencies for known CVEs
        working-directory: app/frontend
        run: npm audit --audit-level=high

      - name: Audit docs-site npm dependencies for known CVEs
        working-directory: docs-site
        run: npm audit --audit-level=high

  verify-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: abtest
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d abtest"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AB_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/abtest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: python -m pip install -r app/backend/requirements-dev.txt

      - name: Run Postgres backend smoke tests
        run: python -m pytest -p no:schemathesis app/backend/tests/test_postgres_backend.py -q

  docker:
    runs-on: ubuntu-latest
    env:
      AB_API_TOKEN: verify-write-token
      AB_READONLY_API_TOKEN: verify-readonly-token
      AB_WORKSPACE_SIGNING_KEY: verify-workspace-signing-key

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Verify secure Docker compose flow
        run: python scripts/verify_docker_compose.py

  lighthouse:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      # Lighthouse only needs to serve the app: the runtime set is enough.
      - name: Install backend dependencies
        run: python -m pip install -r app/backend/requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix app/frontend ci

      - name: Build frontend
        run: npm --prefix app/frontend run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.0

      - name: Run Lighthouse CI
        run: python scripts/run_lighthouse_ci.py

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouseci
          path: .lighthouseci/
          include-hidden-files: true
          if-no-files-found: warn

  update-metrics-badges:
    runs-on: ubuntu-latest
    # Badges must reflect the whole gate, not just verify+lighthouse: a red
    # docker/postgres/audit job must block the bot commit too (audit F-06).
    needs:
      - verify
      - locale-content
      - repo-hygiene
      - dependency-audit
      - verify-postgres
      - docker
      - lighthouse
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # collect_badge_metrics.py is stdlib-only: no backend install needed here.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Download verify metrics artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: verify-metrics
          path: .badge-inputs

      - name: Download Lighthouse artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: lighthouseci
          path: .badge-inputs/lighthouseci

      - name: Refresh badge payloads
        run: >
          python scripts/collect_badge_metrics.py
          --strict
          --coverage .badge-inputs/coverage-backend.json
          --lighthouse .badge-inputs/lighthouseci/manifest.json
          --test-results .badge-inputs/backend-junit.xml
          --test-results .badge-inputs/frontend-junit.xml
          --output badges/metrics.json

      - name: Commit badge payloads
        run: |
          if [ -z "$(git status --porcelain -- badges)" ]; then
            echo "No badge updates"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/*.json
          git commit -m "chore: update badge metrics [skip ci]"
          git push
