name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            verify_args: "--with-e2e --with-coverage --artifacts-dir .ci-artifacts"
          - os: windows-latest
            verify_args: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install -r app/backend/requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix app/frontend ci

      - name: Install Playwright browser (node)
        if: matrix.os == 'ubuntu-latest'
        run: npm --prefix app/frontend exec -- playwright install --with-deps chromium

      - name: Install Playwright browser (python)
        if: matrix.os == 'ubuntu-latest'
        run: python -m playwright install chromium

      - name: Run verify pipeline
        run: python scripts/verify_all.py ${{ matrix.verify_args }}

      - name: Upload verify metrics artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: verify-metrics
          path: |
            .ci-artifacts/backend-junit.xml
            .ci-artifacts/frontend-junit.xml
            .ci-artifacts/coverage-backend.json
          if-no-files-found: warn

  docker:
    runs-on: ubuntu-latest
    env:
      AB_API_TOKEN: verify-write-token
      AB_READONLY_API_TOKEN: verify-readonly-token
      AB_WORKSPACE_SIGNING_KEY: verify-workspace-signing-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify secure Docker compose flow
        run: python scripts/verify_docker_compose.py

  lighthouse:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install -r app/backend/requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix app/frontend ci

      - name: Build frontend
        run: npm --prefix app/frontend run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.0

      - name: Run Lighthouse CI
        run: python scripts/run_lighthouse_ci.py

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci
          path: .lighthouseci/
          if-no-files-found: warn

  update-metrics-badges:
    runs-on: ubuntu-latest
    needs:
      - verify
      - lighthouse
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: python -m pip install -r app/backend/requirements.txt

      - name: Download verify metrics artifact
        uses: actions/download-artifact@v4
        with:
          name: verify-metrics
          path: .badge-inputs

      - name: Download Lighthouse artifact
        uses: actions/download-artifact@v4
        with:
          name: lighthouseci
          path: .badge-inputs/lighthouseci

      - name: Refresh badge payloads
        run: >
          python scripts/collect_badge_metrics.py
          --coverage .badge-inputs/coverage-backend.json
          --lighthouse .badge-inputs/lighthouseci/manifest.json
          --test-results .badge-inputs/backend-junit.xml
          --test-results .badge-inputs/frontend-junit.xml
          --output badges/metrics.json

      - name: Commit badge payloads
        run: |
          if [ -z "$(git status --porcelain -- badges)" ]; then
            echo "No badge updates"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/*.json
          git commit -m "chore: update badge metrics [skip ci]"
          git push
