name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            run_e2e: true
          - os: windows-latest
            run_e2e: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install -r app/backend/requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix app/frontend ci

      - name: Install Playwright browser
        if: matrix.run_e2e
        run: npm --prefix app/frontend exec -- playwright install --with-deps chromium

      - name: Run verify pipeline
        run: python scripts/verify_all.py ${{ matrix.run_e2e && '--with-e2e' || '' }}

  docker:
    runs-on: ubuntu-latest
    env:
      AB_API_TOKEN: verify-write-token
      AB_READONLY_API_TOKEN: verify-readonly-token
      AB_WORKSPACE_SIGNING_KEY: verify-workspace-signing-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify secure Docker compose flow
        run: python scripts/verify_docker_compose.py

  lighthouse:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix app/frontend ci

      - name: Build frontend
        run: npm --prefix app/frontend run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Start preview server
        working-directory: app/frontend
        run: npx serve dist --listen tcp://127.0.0.1:3000 >/tmp/serve.log 2>&1 &

      - name: Run Lighthouse CI
        run: |
          sleep 5
          lhci autorun --config=.lighthouserc.json
