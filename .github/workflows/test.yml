name: Tests

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            run_e2e: true
          - os: windows-latest
            run_e2e: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install -r app/backend/requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix app/frontend ci

      - name: Install Playwright browser
        if: matrix.run_e2e
        run: npm --prefix app/frontend exec playwright install --with-deps chromium

      - name: Run verify pipeline
        run: python scripts/verify_all.py ${{ matrix.run_e2e && '--with-e2e' || '' }}

  docker:
    runs-on: ubuntu-latest
    env:
      AB_API_TOKEN: verify-write-token
      AB_READONLY_API_TOKEN: verify-readonly-token
      VITE_API_TOKEN: verify-write-token

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify secure Docker compose flow
        run: python scripts/verify_docker_compose.py
