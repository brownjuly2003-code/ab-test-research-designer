name: Deploy docs site (Astro Starlight) to Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs-site/**'
      - 'app/backend/app/main.py'
      - 'app/backend/app/frontend_routes.py'
      - 'app/backend/app/routes/**'
      - 'app/backend/app/stats/**'
      - 'app/backend/app/config.py'
      - 'app/backend/templates/**'
      - 'slack/app-manifest.yml'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.github/workflows/docs-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install
        working-directory: docs-site
        run: npm ci

      # This workflow is the only one that publishes the docs, and it can be dispatched
      # manually against any ref, so the dependency gate is repeated here rather than left
      # solely to the `dependency-audit` job in test.yml: a known-vulnerable tree must not
      # reach Pages. Same threshold as test.yml — high/critical fails, lower severities report.
      - name: Audit npm dependencies for known CVEs
        working-directory: docs-site
        run: npm audit --audit-level=high

      # The generator scripts (sync-docs/gen-routes/gen-experiments/gen-config) run as a
      # prebuild hook and rewrite the docs content; their unit tests gate that rewriting
      # before it is published.
      - name: Test
        working-directory: docs-site
        run: npm test

      - name: Build
        working-directory: docs-site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
