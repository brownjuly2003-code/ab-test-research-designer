version: 2
updates:
  - package-ecosystem: pip
    directory: /app/backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /app/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /docs-site
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Keeps the digest-pinned base images in Dockerfile fresh (audit F-10).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
