name: Onboarding Completion
category: Engagement
description: Measure whether onboarding changes improve completion rate for new accounts.
tags:
  - binary
  - onboarding
  - activation
payload:
  project:
    project_name: ""
    domain: saas
    product_type: web app
    platform: web
    market: Global
    project_description: Improve the first-session onboarding completion funnel.
  hypothesis:
    change_description: Reduce onboarding steps and surface progress cues
    target_audience: newly registered users
    business_problem: too many users drop before activation
    hypothesis_statement: A shorter onboarding flow will increase completion rate.
    what_to_validate: onboarding completion
    desired_result: more activated users in the first session
  setup:
    experiment_type: ab
    randomization_unit: user
    traffic_split:
      - 50
      - 50
    expected_daily_traffic: 8000
    audience_share_in_test: 0.8
    variants_count: 2
    inclusion_criteria: first-time users
    exclusion_criteria: returning accounts
  metrics:
    primary_metric_name: onboarding_completion_rate
    metric_type: binary
    baseline_value: 0.34
    expected_uplift_pct: 10
    mde_pct: 6
    alpha: 0.05
    power: 0.8
    std_dev: null
    secondary_metrics:
      - feature_activation_rate
    guardrail_metrics:
      - name: Tutorial skip rate
        metric_type: binary
        baseline_rate: 12.0
  constraints:
    seasonality_present: false
    active_campaigns_present: true
    returning_users_present: false
    interference_risk: low
    technical_constraints: event sequencing must stay stable
    legal_or_ethics_constraints: none
    known_risks: attribution gaps for mobile web
    deadline_pressure: medium
    long_test_possible: true
    n_looks: 1
    analysis_mode: frequentist
    desired_precision: null
    credibility: 0.95
  additional_context:
    llm_context: Activation quality matters more than raw step completion.
