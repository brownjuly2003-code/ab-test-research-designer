    <linearGradient id="g" x1="0" y1="0" x2="0.87" y2="1">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="9" fill="url(#g)"/>
  <text x="16" y="21" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="800" letter-spacing="0.3" fill="#ffffff">AB</text>
</svg>
