[tool.mypy]
# Strict static typing gate for the backend application package, on par with the
# RAG_Support / GraceKelly projects. The package is imported as
# `app.backend.app.*` with the repo root on sys.path (PEP 420 namespace
# packages, no __init__.py), so mypy needs the repo root as the package base to
# compute matching module names.
python_version = "3.14"
strict = true
namespace_packages = true
explicit_package_bases = true
mypy_path = "."
files = ["app/backend/app"]
show_error_codes = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
# openpyxl ships no type stubs and has no stub package on PyPI; export_service
# uses it only to write .xlsx workbooks. Suppress the missing-import error here
# rather than scattering inline ignores at every call site.
module = ["openpyxl.*"]
ignore_missing_imports = true

[tool.ruff]
# Lint gate complementing the mypy --strict gate (run from verify_all). Line
# length (E501) is intentionally NOT enforced: the codebase favours descriptive
# long lines in SQL builders, comments and i18n strings, so enforcing a width
# would be churn without signal. The selected families catch real issues only.
target-version = "py313"  # compatibility floor: local dev runs 3.13; CI/runtime are 3.14

[tool.ruff.lint]
# F  = pyflakes (unused imports/vars, undefined names)
# I  = import ordering (isort)
# B  = flake8-bugbear (likely-bugs: zip-without-strict, mutable defaults, ...)
# C4 = flake8-comprehensions (redundant/clearer comprehensions)
# UP = pyupgrade (modern 3.13 idioms)
select = ["F", "I", "B", "C4", "UP"]
